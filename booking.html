<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Jason S. Feimster | Speaker Request</title>
  <meta name="description" content="Request Jason Feimster for your next keynote, offsite, or conference." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand"><span class="brand-mark">⚡</span> Jason S. Feimster</a>
    </div>
  </header>
  <main id="main">
    <section class="booking" style="min-height: 80vh; display: flex; align-items: center;">
      <div class="container grid-2">
        <div class="section-head">
          <span class="kicker">Lock it in</span>
          <h2 style="color: var(--white);">Initiate the <span class="glitch">Activation</span>.</h2>
          <p class="lead" style="color: #ccc;">
            Fill out the details below. If the alignment is right, my team will respond within 24 hours to secure the date and schedule a briefing call.
          </p>
        </div>
        <div class="card" style="color: var(--ink);">
          <form id="standaloneBookingForm" action="#" method="post" novalidate>
            <div>
              <label for="name">Your Name / Organizer</label>
              <input id="name" name="name" type="text" required />
            </div>
            <div>
              <label for="email">Work Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div>
              <label for="event">Event Name & Location</label>
              <input id="event" name="event" type="text" required />
            </div>
            <div>
              <label for="details">What do you want the audience to DO after the talk?</label>
              <textarea id="details" name="details" required></textarea>
            </div>
            <button class="btn full dark" type="submit">Submit Request</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-inner">
      <span>© 2024 Jason S. Feimster</span>
    </div>
  </footer>
</body>
</html>
