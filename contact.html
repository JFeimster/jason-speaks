<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Jason S. Feimster</title>
  <meta name="description" content="Get in touch with Jason Feimster's team for press, partnerships, or general inquiries." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand"><span class="brand-mark">⚡</span> Jason S. Feimster</a>
    </div>
  </header>
  <main id="main">
    <section class="hero" style="min-height: 80vh; display: flex; align-items: center;">
      <div class="container grid-2">
        <div class="section-head">
          <span class="kicker">Comms Link</span>
          <h1>Make It <span class="glitch">Brief</span>.</h1>
          <p class="lead">For speaking engagements, use the <a href="/booking.html" style="text-decoration: underline;">Booking Page</a>. For press, partnerships, or high-leverage opportunities, use the form below.</p>
        </div>
        <div class="card cyan">
          <form id="contactForm" action="#" method="post" novalidate>
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div>
              <label for="message">The Pitch</label>
              <textarea id="message" name="message" required placeholder="What's the play?"></textarea>
            </div>
            <button class="btn full dark" type="submit">Transmit</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-inner">
      <span>© 2024 Jason S. Feimster</span>
    </div>
  </footer>
</body>
</html>
